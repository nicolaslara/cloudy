# Fly.io config for the cloudy backend (FastAPI on Fly Machines).
#
# Kept deliberately small: one HTTP service, migrations on deploy, machines that
# stop when idle and start on the next request. Secrets (DATABASE_URL,
# CORS_ALLOW_ORIGINS) are NOT here — they're set out of band via `fly secrets`
# and surface as env vars in the container. Terraform owns provisioning; this
# file just describes the app shape.

app = "cloudy-api"
primary_region = "arn"  # Stockholm — closest Fly region to the Swedish data/users.

[build]
  # Build the Dockerfile in this directory (the backend root is the build context).
  dockerfile = "Dockerfile"

# Migrations run as the release_command on every deploy: flyctl runs `cloudy
# migrate` (alembic upgrade head) in a one-off machine on the NEW image before it
# takes traffic, so the schema is ready ahead of the code that needs it. It reads
# DATABASE_URL from the app's Fly secrets (the pooled Neon URL); migrations are
# short, so the pooler is fine. Idempotent — a no-op when nothing is pending. The
# image ships alembic/ + alembic.ini for exactly this. The weekly backtest is a
# static artifact baked into the image, so no per-deploy evaluation runs.
[deploy]
  release_command = "cloudy migrate"

[env]
  # The app binds 0.0.0.0:$PORT; keep PORT and the service internal_port in
  # lockstep. Docs surface is on in production: the API_DOCS setting in
  # cloudy/config.py serves /docs, /redoc, and /openapi.json when true.
  PORT = "8080"
  API_DOCS = "true"

[http_service]
  internal_port = 8080
  force_https = true
  # Scale to zero when idle, wake on the next request — this is a low-traffic
  # demo API, so we don't pay for idle machines.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

  # Fly health checks hit the app's health route; it degrades (never 500s) when
  # Postgres is down, so a 200 here means the process is up and serving.
  [[http_service.checks]]
    method = "GET"
    path = "/api/v1/health"
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
